<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #15202b;
      color: #e7e9ea;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header img { width: 28px; height: 28px; border-radius: 50%; }
    .header h1 { font-size: 14px; font-weight: 700; color: #e7e9ea; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e2d3d;
      border-radius: 10px;
      padding: 10px 14px;
    }
    .toggle-label { font-size: 13px; color: #8b98a5; }
    .toggle-label span { display: block; font-size: 12px; color: #536471; margin-top: 2px; }
    .switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }
    .switch input { display: none; }
    .slider {
      position: absolute;
      inset: 0;
      background: #536471;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: #1d9bf0; }
    input:checked + .slider:before { transform: translateX(18px); }
    .stats {
      margin-top: 12px;
      font-size: 11px;
      color: #536471;
      text-align: center;
    }
    .stats b { color: #1d9bf0; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="icon">
    <h1>Hide @Grok Tweets</h1>
  </div>
  <div class="toggle-row">
    <div class="toggle-label">
      Activer le filtre
      <span>Comptes sans badge bleu</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle" checked>
      <span class="slider"></span>
    </label>
  </div>
  <div class="stats" id="stats">Chargement...</div>

  <script src="popup.js"></script>
</body>
</html>
